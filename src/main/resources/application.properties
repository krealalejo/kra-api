spring.application.name=kra-api
server.port=8080
logging.level.root=INFO
logging.level.com.kra=DEBUG
# AWS configuration (matches kra-infra Terraform region)
aws.region=eu-west-1
# DynamoDB table name — must match Terraform resource name from Phase 3
aws.dynamodb.table-name=kra-table
# Leave blank for production (uses real AWS endpoint via DefaultCredentialsProvider)
aws.dynamodb.endpoint-override=

# OAuth2 Resource Server - JWT validation with AWS Cognito
# Cognito User Pool from Phase 4 (eu-west-1_sDg68GJKt)
# Format: https://cognito-idp.<AWS_REGION>.amazonaws.com/<USER_POOL_ID>
# Spring Security appends /.well-known/openid-configuration automatically for JWKS discovery
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cognito-idp.eu-west-1.amazonaws.com/eu-west-1_sDg68GJKt
